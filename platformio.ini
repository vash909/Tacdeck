; ================================================================
; Tacdeck — T-Deck Plus 433 MHz All-in-One RF Firmware
; Supports: LoRa, LoRa-APRS, Radiosonde, RTTY, WSPR, CW, OOK,
;           Spectrum Analyzer, Freq Scanner, Weather Sensors,
;           Satellite Tracker (WiFi TLE), LoRaWAN, Mesh, POCSAG
; ================================================================

[platformio]
default_envs = tdeck_433

[env:tdeck_433]
platform            = espressif32@^6.9.0
board               = esp32s3box
framework           = arduino

; Flash & Memory
board_build.mcu                 = esp32s3
board_build.f_cpu               = 240000000L
board_build.f_flash             = 80000000L
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = huge_app.csv

; Serial
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default

; Build Flags
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DRADIOLIB_VERBOSE=0
    -std=gnu++17
    -Wno-error=deprecated-declarations
    -DFIRMWARE_VERSION='"1.0.0"'
    -DFIRMWARE_NAME='"Tacdeck"'

; Libraries
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    jgromes/RadioLib@^6.6.0
    mikalhart/TinyGPSPlus@^1.0.3
    bblanchon/ArduinoJson@^7.0.4
    ; WiFi + HTTPClient are built into ESP32 Arduino framework

[env:tdeck_868]
extends             = env:tdeck_433
build_flags         =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DRADIOLIB_VERBOSE=0
    -std=gnu++17
    -DFIRMWARE_VERSION='"1.0.0"'
    -DFIRMWARE_NAME='"Tacdeck"'
    -DBAND_868=1
